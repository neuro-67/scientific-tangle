name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DEPLOY_HOST: ${{ secrets.SSH_HOST }}
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/pr

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Materialize .env from secret
        run: |
          printf '%s' "${{ secrets.ENV_FILE }}" > .env
          test -s .env || { echo "ENV_FILE secret is empty"; exit 1; }

      - name: Ensure remote deploy path exists
        run: |
          ssh -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $DEPLOY_PATH"

      - name: Rsync repo to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='.mypy_cache' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Rebuild and restart stack
        run: |
          ssh -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $DEPLOY_PATH && docker compose pull --ignore-pull-failures && docker compose up -d --build --remove-orphans && docker compose ps"
