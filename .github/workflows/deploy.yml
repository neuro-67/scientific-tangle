name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DEPLOY_HOST: ${{ secrets.SSH_HOST }}
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/pr
  SSHPASS: ${{ secrets.SSH_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: SSH_HOST 

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "$DEPLOY_HOST" || { echo "SSH_HOST secret is empty"; exit 1; }
          test -n "$SSHPASS" || { echo "SSH_PASSWORD secret is empty"; exit 1; }

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Trust remote host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts || { echo "ssh-keyscan returned empty — host $DEPLOY_HOST unreachable on port 22"; exit 1; }

      - name: Materialize .env from secret
        run: |
          printf '%s' "${{ secrets.ENV_FILE }}" > .env
          test -s .env || { echo "ENV_FILE secret is empty"; exit 1; }

      - name: Ensure remote deploy path exists
        run: |
          sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $DEPLOY_PATH"

      - name: Rsync repo to server
        run: |
          sshpass -e rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='.mypy_cache' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            -e "ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Rebuild and restart stack
        run: |
          sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $DEPLOY_PATH && docker compose pull --ignore-pull-failures && docker compose up -d --build --remove-orphans && docker compose ps"
